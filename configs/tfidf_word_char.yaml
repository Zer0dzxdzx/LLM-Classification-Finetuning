data:
  train_path: /kaggle/input/llm-classification-finetuning/train.csv
  test_path: /kaggle/input/llm-classification-finetuning/test.csv
  sample_size:
  text_max_chars: 12000

features:
  kind: word_char
  max_features: 100000
  ngram_range: [1, 2]
  char_max_features: 100000
  char_ngram_range: [3, 5]
  min_df: 2
  max_df: 0.95
  lowercase: true
  use_text_stats: false

model:
  type: tfidf_logreg
  artifact_path: outputs/models/tfidf_word_char_logreg.joblib

train:
  validation_size: 0.15
  cv_folds: 1
  random_seed: 42
  max_iter: 1000
  solver: lbfgs
  class_weight: balanced
  c: 2.0

outputs:
  metrics_path: outputs/metrics/tfidf_word_char_metrics.json
